name: kneipentour
description: "Eine App zum Sammeln und Bewerten von Kneipen."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^3.3.2

  # Navigation
  go_router: ^16.0.0

  # Lokaler Speicher
  shared_preferences: ^2.5.3


  # Speicherpfade
  path_provider: ^2.1.5

  # Karten
  flutter_map: ^8.3.1
  latlong2: ^0.10.1

  # Links öffnen (Google Maps etc.)
  url_launcher: ^6.3.2

  # Datumsformatierung
  intl: ^0.20.2

  # IDs erzeugen
  uuid: ^4.5.1

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter


flutter:
  uses-material-design: true

  assets:
    - assets/images/